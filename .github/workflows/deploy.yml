name: CD — Build, Push, Deploy & Health Check

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  checks: write

jobs:
  # ── CI: Build, Test & Code Quality ──
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build
        run: mvn compile -q

      - name: Run tests
        run: mvn test

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Results
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Checkstyle
        run: mvn checkstyle:check -q
        continue-on-error: true

      - name: SpotBugs
        run: mvn spotbugs:check -q
        continue-on-error: true

  # ── CD Delivery: Push image to GHCR ──
  push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push SHA image (real app)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            IMAGE_TAG=sha-${{ github.sha }}
          tags: |
            ghcr.io/gabel1998/talent-api:sha-${{ github.sha }}

      - name: Build and push latest image (joke)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            IMAGE_TAG=latest
          tags: |
            ghcr.io/gabel1998/talent-api:latest

  # ── Security: Trivy vulnerability scan ──
  trivy-scan:
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/gabel1998/talent-api:sha-${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ── CD Deployment: Update SHA in portfolio + deploy ──
  deploy:
    needs: push-image
    runs-on: ubuntu-latest
    steps:
      - name: Update image SHA in portfolio docker-compose
        uses: actions/checkout@v4
        with:
          repository: Gabel1998/portfolio
          token: ${{ secrets.PORTFOLIO_PAT }}
          path: portfolio

      - name: Set new SHA tag in docker-compose.yml
        run: |
          cd portfolio
          sed -i "s|ghcr.io/gabel1998/talent-api:sha-[a-f0-9]*|ghcr.io/gabel1998/talent-api:sha-${{ github.sha }}|" docker-compose.yml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git diff --cached --quiet || git commit -m "update talent-api image to sha-${{ github.sha }}"
          git push

      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/portfolio
            git pull
            docker compose pull talent-api
            docker compose up -d talent-api
            docker image prune -f

  # ── CF: Health check & smoke test ──
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for container startup
        run: sleep 15

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://andreasgabel.dk/talent-api/actuator/health || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS — trying direct port..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.DROPLET_HOST }}:8085/actuator/health || echo "000")
          fi
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

      - name: Smoke test — GET /talent
        run: |
          RESPONSE=$(curl -s https://andreasgabel.dk/talent-api/talent || curl -s http://${{ secrets.DROPLET_HOST }}:8085/talent)
          if echo "$RESPONSE" | grep -q "Andreas Gabel"; then
            echo "Smoke test passed — API returns talent data"
          else
            echo "Smoke test failed — unexpected response"
            echo "$RESPONSE"
            exit 1
          fi
